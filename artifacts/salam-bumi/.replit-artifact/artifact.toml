kind = "web"
previewPath = "/"
title = "Salam Bumi Property"
version = "1.0.0"
id = "artifacts/salam-bumi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22682

[services.development]
run = "pnpm --filter @workspace/salam-bumi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/salam-bumi", "run", "build" ]
publicDir = "artifacts/salam-bumi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22682"
BASE_PATH = "/"
